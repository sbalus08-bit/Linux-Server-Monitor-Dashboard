<!DOCTYPE html>
<html>
<head>
	<title>Linux Dashboard</title>
</head>

<body>

<h1>Linux Monitoring Dashboard</h1>

<p>Hostname: {{ hostname }}</p>

<p>CPU Usage: {{ cpu }}%</p>

<p>Memory Usage: {{ memory }}%</p>

<p>Disk Usage: {{ disk }}%</p>

<p>Uptime: {{ uptime }} hours</p>

<p>SSH Status: {{ ssh_status }}</p>

<h2>Services</h2>

<ul>
{% for service, satus in services.items() %}
	<li>{{ service }} : {{ status }}</li>
{% endfor %}
</ul>


</body>

</html>
